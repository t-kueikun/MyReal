#:schema https://developers.openai.com/codex/config-schema.json

# Project-local Codex config inspired by Everything Claude Code.
# Keep this repo-local so the guidance applies only to MyReal.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

persistent_instructions = "Follow AGENTS.md and .codex/AGENTS.md. Prefer local skills and verify non-trivial changes with the relevant test or build command."

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 30

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
startup_timeout_sec = 30

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--extension"]
startup_timeout_sec = 30

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 30

[features]
multi_agent = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for tracing execution paths and dependencies."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on regressions, correctness, and security."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist for framework and API verification."
config_file = "agents/docs-researcher.toml"
